<!DOCTYPE html>
<html>

<head>
    <title>Pong</title>
    <link rel="icon" type="image/png" href="../assets/Transcendaire.png">
    <link href="../config/tools.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../config/config-tailwind.js"></script>
</head>

<body class="bg-sonpi16-black h-screen m-0 p-0">
    <header class="w-full h-22 bg-sonpi16-orange border-sonpi16-orange flex items-center top-0 left-0 z-50">
        <div class="flex items-center flex-1">
            <img  src="../assets/Transcendaire.png" class="w-28 h-28 z-10 left-0" alt="Transcendaire">
            <h1  class="hidden md:block text-sonpi16-black text-4xl font-bold z-20 ml-10 font-quency md:border-sonpi16-black">Transcendaire</h1>
        </div>
        <div class="mr-10 flex">
            <div id="sign-up"class="flex-1  mr-2 border-sonpi16-black bg-sonpi16-balck text-sonpi16-black border-2 px-3 pt-0.5 pb-1 transition duration-300 hover:scale-105 hover:bg-sonpi16-black hover:text-sonpi16-orange">
                <h2 class="text-2xl font-bold">sign-up</h2>
            </div>
            <div id="sign-in" class="flex-2 border-sonpi16-black bg-sonpi16-orange text-sonpi16-black border-2 px-3 pt-0.5 pb-1 transition duration-300 hover:scale-105 hover:bg-sonpi16-black hover:text-sonpi16-orange"> 
                <h2 class="text-2xl font-bold">sign-in</h2>
            </div>
        </div>
    </header>
    
  <main class="grid place-items-center">
    <div class="grid gap-6 w-full max-w-md">
      <button class="bg-yellow-500 hover:bg-yellow-600 text-black font-semibold py-4 rounded-2xl shadow-lg transition">
        🎮 Partie rapide
      </button>
      <button class="bg-purple-500 hover:bg-purple-600 text-white font-semibold py-4 rounded-2xl shadow-lg transition">
        🏆 Tournoi
      </button>
    </div>
  </main>

</body>

</html>
