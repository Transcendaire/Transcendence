<!DOCTYPE html>
<html>
<head>
    <title>Pong</title>
    <link rel="icon" type="image/png" href="./assets/Transcendaire.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sonpi16-orange': '#ff6000',
						'sonpi16-black' : '#0d0600',
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'QuencyPixel-Regular';
            src: url('./assets/fonts/QuencyPixel-Regular.otf') format('opentype');
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-sonpi16-orange h-screen m-0 p-0">

    <header class="w-full h-20 bg-sonpi16-black flex items-center justify-between fixed top-0 left-0 z-50">

            </div>
            <div id="sign-in" class="flex-2 border-sonpi16-orange bg-sonpi16-black text-sonpi16-orange border-2 px-3 py-0.5 transition duration-300 hover:scale-105 hover:bg-sonpi16-orange hover:text-sonpi16-black">

            </div>

    <!-- Lobby Screen -->
</main>
    <div class="flex flex-col items-center h-screen pt-16">
